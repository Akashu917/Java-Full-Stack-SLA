<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="#">MySite</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Services</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>

      </ul>
    </div>

  </div>
</nav>
<div class="container mt-5">

  <h1 class="text-center text-primary mb-4">Bootstrap Grid Example</h1>

  <div class="row">
    <div class="col-lg-4 col-12 bg-light p-4 mb-3">
      <h4>Column 1</h4>
      <p>This column stacks on small screens.</p>
    </div>

    <div class="col-lg-4 col-12 bg-secondary text-white p-4 mb-3">
      <h4>Column 2</h4>
      <p>This column contains a nested row.</p>
      <div class="row mt-3">
        <div class="col-6 bg-dark p-3">
          Sub 1
        </div>
        <div class="col-6 bg-warning text-dark p-3">
          Sub 2
        </div>
      </div>

    </div>
    <div class="col-lg-4 col-12 bg-light p-4 mb-3">
      <h4>Column 3</h4>
      <p>Responsive layout using Bootstrap.</p>
    </div>

  </div>

</div>


</body>
