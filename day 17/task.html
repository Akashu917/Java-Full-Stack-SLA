<!DOCTYPE html>
<html>
<head>
    <title>Boat Crew</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #crewDiv {
            margin-bottom: 20px;
        }
        #crewList {
            list-style-type: none;
            padding: 0;
        }
        #crewList li {
            background-color: #f0f0f0;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
        button {
            margin-right: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;

        }
        button:hover {
            background-color: gray;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Story Line 1 -->
    <div id="crewDiv">
        <h2>Crew Members</h2>
        <ul id="crewList">
            <li>Jack</li>
            <li>Alice</li>
            <li>Bob</li>
            <li>Emma</li>
        </ul>
    </div>

    <!-- Story Line 2 -->
    <h2>Choose Route</h2>
    <button onclick="jackRoute()">Ask Jack</button>
    <button onclick="aliceRoute()">Ask Alice</button>

    <p id="result"></p>

    <script>
        function jackRoute() {
            document.getElementById("result").innerText = 
                "Jack says: Take the north route, it's faster but risky!";
        }

        function aliceRoute() {
            document.getElementById("result").innerText = 
                "Alice says: Take the south route, it's safe but longer.";
        }
    </script>

</body>
</html>
